<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Détail Portefeuille</title>
  <script src="js/tailwind.js"></script>
  <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <style>
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .btn-active:active {
      transform: scale(0.96);
    }

    .balance-masked {
      letter-spacing: 0.1em;
      font-family: inherit;
    }

    html {
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
    }

    /* Bottom Sheet Animation */
    #actionSheet {
      transition: visibility 0.3s, opacity 0.3s;
    }

    #actionSheetContent {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sheet-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .sheet-content-hidden {
      transform: translateY(100%);
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      z-index: 100;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 8px;
      min-width: 150px;
      display: none;
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.2s;
    }

    .context-menu.active {
      display: block;
      transform: scale(1);
      opacity: 1;
    }

    /* Select Styles */
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    /* Overlay Animation */
    .overlay-in {
      animation: overlayIn 0.3s ease-out forwards;
    }

    @keyframes overlayIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">

    <!-- STICKY TOP CONTAINER -->
    <div class="sticky top-0 z-40 bg-white">
      <!-- HEADER SECTION -->
      <div id="walletHeader"
        class="bg-emerald-600 text-white p-6 rounded-b-[40px] shadow-lg active:bg-emerald-700 transition-colors">
        <div class="flex items-center justify-between mb-6">
          <button onclick="nav('index.html')"
            class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center active:scale-90 transition">
            <i class="fa-solid fa-arrow-left text-lg"></i>
          </button>
          <div class="flex-1 text-center pr-10">
            <h1 id="walletName" class="font-bold text-xl truncate px-4 tracking-tight">Chargement...</h1>
          </div>
        </div>

        <div class="text-center pb-2">
          <p class="text-emerald-100 text-[10px] font-bold uppercase tracking-[0.2em] opacity-80 mb-1">Solde disponible
          </p>
          <div class="flex items-center justify-center gap-3">
            <h2 id="walletBalance" class="text-4xl font-bold tabular-nums tracking-tight">0 FCFA</h2>
            <button onclick="toggleBalance()" id="eyeButton"
              class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center transition-all active:scale-95 border border-white/10">
              <i class="fa-solid fa-eye text-lg"></i>
            </button>
          </div>
          <p id="currentDate" class="text-emerald-100/60 text-[9px] mt-4 font-bold uppercase tracking-widest">...</p>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex justify-around px-6 -mt-8 relative z-50">
        <button onclick="openTxModal('deposit')"
          class="bg-white w-20 h-20 rounded-[28px] shadow-xl shadow-emerald-900/5 flex flex-col items-center justify-center btn-active transition-all group border border-emerald-50">
          <div
            class="bg-emerald-50 w-10 h-10 rounded-full flex items-center justify-center mb-1 group-hover:bg-emerald-100 transition-colors">
            <i class="fa-solid fa-arrow-up text-emerald-600 text-lg"></i>
          </div>
          <span class="text-[9px] text-emerald-600 font-bold uppercase tracking-tighter">Ajouter</span>
        </button>

        <button onclick="openTxModal('withdrawal')"
          class="bg-white w-20 h-20 rounded-[28px] shadow-xl shadow-red-900/5 flex flex-col items-center justify-center btn-active transition-all group border border-red-50">
          <div
            class="bg-red-50 w-10 h-10 rounded-full flex items-center justify-center mb-1 group-hover:bg-red-100 transition-colors">
            <i class="fa-solid fa-arrow-down text-red-500 text-lg"></i>
          </div>
          <span class="text-[9px] text-red-500 font-bold uppercase tracking-tighter">Retirer</span>
        </button>

        <button onclick="openPlanModal()"
          class="bg-white w-20 h-20 rounded-[28px] shadow-xl shadow-orange-900/5 flex flex-col items-center justify-center btn-active transition-all group border border-orange-50">
          <div
            class="bg-orange-50 w-10 h-10 rounded-full flex items-center justify-center mb-1 group-hover:bg-orange-100 transition-colors">
            <i class="fa-solid fa-calendar-check text-orange-500 text-lg"></i>
          </div>
          <span class="text-[9px] text-orange-500 font-bold uppercase tracking-tighter">Planifier</span>
        </button>
      </div>
    </div>

    <!-- MAIN SCROLL AREA -->
    <div class="flex-1 overflow-y-auto scrollbar-hide">

      <!-- PLANIFICATIONS SECTION -->
      <div class="px-6 pt-10">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-bold text-gray-800 text-lg flex items-center gap-2">
            Planifications
            <span id="planCount"
              class="bg-emerald-100 text-emerald-600 text-[10px] font-black px-2 py-0.5 rounded-full">0</span>
          </h3>
        </div>
        <div id="plansList" class="space-y-4">
          <!-- Les planifications spécifiques au wallet seront injectées ici -->
        </div>
      </div>

      <!-- TRANSACTIONS HISTORY -->
      <div class="px-6 pt-10 pb-20">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-bold text-gray-800 text-lg">Historique</h3>
          <span id="historyCount"
            class="bg-gray-100 text-gray-400 text-[10px] font-bold px-2.5 py-0.5 rounded-full">0</span>
        </div>

        <div id="historyList" class="space-y-4">
          <!-- Skeleton Loading -->
          <div class="animate-pulse bg-gray-50 h-16 rounded-[28px]"></div>
          <div class="animate-pulse bg-gray-50 h-16 rounded-[28px]"></div>
        </div>
      </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="contextMenu" class="context-menu border border-gray-100">
      <button onclick="handleContextEdit()"
        class="w-full text-left px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 flex items-center gap-3 rounded-xl">
        <i class="fa-solid fa-pen text-emerald-600"></i> Modifier
      </button>
      <button onclick="handleContextDelete()"
        class="w-full text-left px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 flex items-center gap-3 rounded-xl">
        <i class="fa-solid fa-trash"></i> Supprimer
      </button>
    </div>

    <!-- UNIFIED BOTTOM SHEET -->
    <div id="actionSheet" class="fixed inset-0 z-[100] sheet-hidden">
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeSheet()"></div>
      <div id="actionSheetContent"
        class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[40px] shadow-2xl p-8 sheet-content-hidden flex flex-col max-h-[90vh]">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 flex-shrink-0"></div>

        <div id="sheetForm" class="flex-1 overflow-y-auto scrollbar-hide">
          <div class="flex items-center gap-4 mb-6">
            <h3 id="formTitle" class="text-xl font-bold text-gray-800">Transaction</h3>
          </div>

          <div class="space-y-4 pb-6">
            <!-- Formulaire Wallet -->
            <div id="walletForm" class="hidden space-y-4">
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nom du
                  portefeuille</label>
                <input type="text" id="walletNameInput" placeholder="ex: Mobile Money"
                  class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none border-2 border-transparent focus:border-emerald-500">
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Description /
                  Précision</label>
                <input type="text" id="walletDescInput" placeholder="N° de téléphone, usage..."
                  class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-medium outline-none border-2 border-transparent focus:border-emerald-500">
              </div>
            </div>

            <!-- Formulaire Transaction -->
            <div id="txForm" class="space-y-4">
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Montant (FCFA)</label>
                <input type="number" id="formAmount" placeholder="0"
                  class="w-full bg-gray-50 border-2 border-transparent focus:border-emerald-500 focus:bg-white rounded-2xl p-4 text-xl font-bold outline-none">
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Motif /
                  Précision</label>
                <input type="text" id="formReason" placeholder="Note rapide..."
                  class="w-full bg-gray-50 border-2 border-transparent focus:border-emerald-500 focus:bg-white rounded-2xl p-4 text-sm font-medium outline-none">
              </div>
            </div>

            <!-- Formulaire Planification -->
            <div id="planForm" class="hidden space-y-4">
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nom de la
                  planification</label>
                <input type="text" id="planName" placeholder="ex: Loyer"
                  class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Description /
                  Précision</label>
                <textarea id="planDesc" placeholder="Détails importants..."
                  class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-medium outline-none h-20"></textarea>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Montant</label>
                  <input type="number" id="planAmount" placeholder="0"
                    class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
                </div>
                <div>
                  <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Type</label>
                  <select id="planType" class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
                    <option value="withdrawal">Retrait</option>
                    <option value="deposit">Dépôt</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Date de départ</label>
                <input type="date" id="planDate"
                  class="w-full bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Fréquence</label>
                <div class="flex gap-2">
                  <input type="number" id="planFreqVal" placeholder="Ex: 1"
                    class="w-20 bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
                  <select id="planFreqUnit" class="flex-1 bg-gray-50 rounded-2xl p-4 text-sm font-bold outline-none">
                    <option value="none">Aucune (une fois)</option>
                    <option value="days">Jours</option>
                    <option value="weeks">Semaines</option>
                    <option value="months">Mois</option>
                    <option value="years">Années</option>
                  </select>
                </div>
              </div>
            </div>

            <button onclick="submitForm()" id="formSubmitBtn"
              class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-4">
              Enregistrer
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- VALIDATION MODAL -->
    <div id="validationModal" style="display:none" class="fixed inset-0 z-[300] items-center justify-center p-6">
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeValidationModal()"></div>
      <div class="bg-white rounded-[32px] p-6 shadow-2xl relative w-full max-w-sm overlay-in border border-gray-100">
        <h3 class="text-xl font-bold text-gray-800 mb-2">Valider l'opération</h3>
        <p id="validationPlanName" class="text-sm font-bold text-gray-500 mb-6"></p>
        <div class="mb-6">
          <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Motif / Description <span
              id="validationMotifAsterisk" class="text-red-500">*</span></label>
          <input type="text" id="validationMotif"
            class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-bold text-gray-700 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 transition"
            placeholder="Ex: Loyer du mois...">
        </div>
        <div class="flex gap-3">
          <button onclick="closeValidationModal()"
            class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-2xl font-bold text-sm active:scale-95 transition">Annuler</button>
          <button onclick="confirmValidation()"
            class="flex-1 py-3 bg-emerald-600 text-white rounded-2xl font-bold text-sm active:scale-95 transition shadow-lg shadow-emerald-200">Confirmer</button>
        </div>
      </div>
    </div>

    <!-- DELETE MODAL -->
    <div id="deleteModal" style="display:none" class="fixed inset-0 z-[300] items-center justify-center p-6">
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
      <div class="bg-white rounded-[32px] p-6 shadow-2xl relative w-full max-w-sm overlay-in border border-gray-100">
        <div class="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4 mx-auto">
          <i class="fa-solid fa-trash-can text-xl"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800 text-center mb-2">Supprimer l'élément</h3>
        <p class="text-sm font-medium text-gray-500 text-center mb-6">Pour confirmer la suppression de <span
            id="deleteItemName" class="font-bold text-gray-800"></span>, tapez son nom exact ci-dessous.</p>
        <div class="mb-6">
          <input type="text" id="deleteConfirmInput"
            class="w-full bg-red-50/50 border border-red-100 rounded-2xl px-4 py-3 text-sm font-bold text-red-700 outline-none focus:border-red-500 focus:ring-4 focus:ring-red-50 transition text-center"
            placeholder="Nom de l'élément...">
        </div>
        <div class="flex gap-3">
          <button onclick="closeDeleteModal()"
            class="flex-1 py-3 bg-gray-100 text-gray-600 rounded-2xl font-bold text-sm active:scale-95 transition">Annuler</button>
          <button onclick="confirmDelete()"
            class="flex-1 py-3 bg-red-500 text-white rounded-2xl font-bold text-sm active:scale-95 transition shadow-lg shadow-red-200">Supprimer</button>
        </div>
      </div>
    </div>

    <!-- ERROR MODAL (Insufficient funds or other errors) -->
    <div id="errorModal" style="display:none" class="fixed inset-0 z-[400] items-center justify-center p-6">
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeErrorModal()"></div>
      <div
        class="bg-white rounded-[32px] p-6 shadow-2xl relative w-full max-w-sm overlay-in border border-gray-100 text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4 mx-auto">
          <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">Opération refusée</h3>
        <p id="errorMessage" class="text-sm font-medium text-gray-500 mb-8 px-4"></p>
        <button onclick="closeErrorModal()"
          class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm active:scale-95 transition shadow-lg shadow-gray-200">Compris</button>
      </div>
    </div>

    <!-- DESCRIPTION OVERLAY -->
    <div id="descOverlay" style="display:none" class="fixed inset-0 z-[200] items-center justify-center p-6">
      <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeDesc()"></div>
      <div class="bg-white rounded-[32px] p-8 shadow-2xl relative max-w-sm w-full border border-gray-100 overlay-in">
        <button onclick="closeDesc()"
          class="absolute top-4 right-4 w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center active:scale-90 transition shadow-sm">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
        <div class="flex items-center gap-3 mb-5">
          <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
          <h4 class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Description complète</h4>
        </div>
        <div id="descFullText"
          class="text-gray-700 text-sm font-medium leading-relaxed max-h-56 overflow-y-auto scrollbar-hide"></div>
      </div>
    </div>

    <!-- NAVIGATION BAR -->
    <div
      class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-around items-center z-50 rounded-t-[30px] shadow-2xl">
      <button onclick="nav('index.html')"
        class="text-gray-400 flex flex-col items-center gap-1.5 transition-all opacity-70">
        <div class="p-2">
          <i class="fa-solid fa-house-chimney text-lg"></i>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest">Accueil</span>
      </button>
      <button onclick="nav(window.location.href)"
        class="text-emerald-600 flex flex-col items-center gap-1.5 transition-all">
        <div class="bg-emerald-50 p-2 rounded-xl">
          <i class="fa-solid fa-wallet text-lg"></i>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest">Wallets</span>
      </button>
      <button onclick="nav('history.html')"
        class="text-gray-400 flex flex-col items-center gap-1.5 transition-all opacity-70">
        <div class="p-2">
          <i class="fa-solid fa-clock-rotate-left text-lg"></i>
        </div>
        <span class="text-[9px] font-black uppercase tracking-widest">Historique</span>
      </button>
    </div>

  </div>

  <script>
    // ==========================================
    // INLINED DATABASE LOGIC (db.js)
    // ==========================================
    window.db = (function () {
      let dbInstance = null;
      async function initDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("PortefeuilleDB", 4);
          request.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains("wallets")) d.createObjectStore("wallets", { keyPath: "id", autoIncrement: true });
            if (!d.objectStoreNames.contains("transactions")) d.createObjectStore("transactions", { keyPath: "id", autoIncrement: true }).createIndex("walletId", "walletId", { unique: false });
            if (!d.objectStoreNames.contains("planifications")) d.createObjectStore("planifications", { keyPath: "id", autoIncrement: true }).createIndex("walletId", "walletId", { unique: false });
          };
          request.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
          request.onerror = (e) => reject(e.target.error);
        });
      }
      async function getDB() { if (dbInstance) return dbInstance; return await initDB(); }
      async function getWalletById(id) {
        const d = await getDB();
        return new Promise(r => d.transaction("wallets", "readonly").objectStore("wallets").get(id).onsuccess = e => r(e.target.result));
      }
      async function updateBalance(id, amount, type) {
        const w = await getWalletById(id);
        if (!w) return;
        const d = await getDB();
        const tx = d.transaction("wallets", "readwrite");
        w.balance += (type === 'deposit' ? amount : -amount);
        tx.objectStore("wallets").put(w);
        return new Promise(r => tx.oncomplete = r);
      }
      async function addTx(walletId, amount, type, reason) {
        const wallet = await getWalletById(walletId);
        if (type === 'withdrawal' && wallet.balance < amount) {
          throw new Error("Solde insuffisant dans ce portefeuille.");
        }
        await updateBalance(walletId, amount, type);
        const d = await getDB();
        const tx = d.transaction("transactions", "readwrite");
        tx.objectStore("transactions").add({ walletId, amount: Math.abs(amount), type, reason, date: Date.now() });
        return new Promise(r => tx.oncomplete = r);
      }
      async function getHistory(walletId) {
        const d = await getDB();
        return new Promise(r => d.transaction("transactions", "readonly").objectStore("transactions").index("walletId").getAll(IDBKeyRange.only(walletId)).onsuccess = e => r(e.target.result.sort((a, b) => b.date - a.date)));
      }
      async function getPlanifications(walletId) {
        const d = await getDB();
        return new Promise(r => d.transaction("planifications", "readonly").objectStore("planifications").index("walletId").getAll(IDBKeyRange.only(walletId)).onsuccess = e => r(e.target.result.filter(p => p.status === 'pending')));
      }
      async function deletePlanification(id) {
        const d = await getDB();
        const tx = d.transaction("planifications", "readwrite");
        tx.objectStore("planifications").delete(id);
        return new Promise(r => tx.oncomplete = r);
      }
      async function validatePlanification(id, motif) {
        const d = await getDB();
        const plan = await new Promise((r, rej) => {
          const txRead = d.transaction("planifications", "readonly");
          const req = txRead.objectStore("planifications").get(id);
          req.onsuccess = e => r(e.target.result);
          req.onerror = () => rej(new Error("Erreur lecture plan"));
        });
        if (!plan) return;
        
        await addTx(plan.walletId, plan.amount, plan.type, motif || plan.label);
        
        const tx = d.transaction("planifications", "readwrite");
        const store = tx.objectStore("planifications");
        if (plan.freqUnit === "none") {
          plan.status = "validated";
        } else {
          plan.startDate = plan.nextDueDate;
          plan.nextDueDate = calculateNextDate(plan.startDate, plan.freqVal, plan.freqUnit);
          plan.status = "pending";
        }
        store.put(plan);
        return new Promise((r, rej) => {
          tx.oncomplete = r;
          tx.onerror = () => rej(tx.error);
        });
      }
      async function addPlan(data) {
        const d = await getDB();
        const tx = d.transaction("planifications", "readwrite");
        data.createdAt = Date.now();
        data.status = "pending";
        data.nextDueDate = calculateNextDate(data.startDate, data.freqVal, data.freqUnit);
        tx.objectStore("planifications").add(data);
        return new Promise(r => tx.oncomplete = r);
      }
      async function updateWallet(id, data) {
        const d = await getDB();
        const tx = d.transaction("wallets", "readwrite");
        const store = tx.objectStore("wallets");
        const wallet = await new Promise(r => store.get(id).onsuccess = e => r(e.target.result));
        Object.assign(wallet, data);
        store.put(wallet);
        return new Promise(r => tx.oncomplete = r);
      }
      async function updatePlanification(id, data) {
        const d = await getDB();
        const tx = d.transaction("planifications", "readwrite");
        const store = tx.objectStore("planifications");
        const plan = await new Promise(r => store.get(id).onsuccess = e => r(e.target.result));
        Object.assign(plan, data);
        if (data.startDate || data.freqVal) plan.nextDueDate = calculateNextDate(plan.startDate, plan.freqVal, plan.freqUnit);
        store.put(plan);
        return new Promise(r => tx.oncomplete = r);
      }
      async function getPlanificationById(id) {
        const d = await getDB();
        return new Promise(r => d.transaction("planifications", "readonly").objectStore("planifications").get(id).onsuccess = e => r(e.target.result));
      }
      function calculateNextDate(start, val, unit) {
        const d = new Date(start || Date.now());
        if (unit === "none") return d.getTime();
        const v = parseInt(val) || 1;
        if (unit === "days") d.setDate(d.getDate() + v);
        else if (unit === "weeks") d.setDate(d.getDate() + (v * 7));
        else if (unit === "months") d.setMonth(d.getMonth() + v);
        else if (unit === "years") d.setFullYear(d.getFullYear() + v);
        return d.getTime();
      }
      return { initDB, getWalletById, updateWallet, addTx, getHistory, getPlanifications, deletePlanification, validatePlanification, addPlan, updatePlanification, getPlanificationById };
    })();

    // ==========================================
    // UI CORE LOGIC
    // ==========================================
    let walletId = null;
    let currentWallet = null;
    let balanceVisible = true;
    let currentAction = null;
    let longPressTarget = null;
    let pressTimer = null;
    window._desc = [];
    window._trunc = (t, n = 38) => t && t.length > n ? t.slice(0, n) + '...' : (t || '');

    // NOTIFICATIONS SYSTEM
    const notifSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    async function requestNotifPermission() {
      if ("Notification" in window) {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
          await Notification.requestPermission();
        }
      }
    }

    window.notify = (title, body) => {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body, icon: 'https://cdn-icons-png.flaticon.com/512/2845/2845874.png' });
        notifSound.play().catch(() => { });
      } else {
        console.log("Notif (No perm):", title, body);
      }
    };

    window.onload = async () => {
      const params = new URLSearchParams(window.location.search);
      walletId = parseInt(params.get('id'));
      if (!walletId) return goBack();

      localStorage.setItem('lastWalletId', walletId);

      try {
        await db.initDB();
        requestNotifPermission(); // Non-blocking

        // Register Service Worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        updateDate();
        await refreshUI();
        initLongPress();
      } catch (err) { console.error(err); }
    };

    function goBack() { window.history.back(); }

    function updateDate() {
      const now = new Date();
      document.getElementById("currentDate").textContent = now.toLocaleDateString('fr-FR', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    async function refreshUI() {
      window._desc = [];
      currentWallet = await db.getWalletById(walletId);
      if (!currentWallet) return goBack();

      document.getElementById("walletName").textContent = currentWallet.name;

      // Update description in header
      let descEl = document.getElementById("walletHeaderDesc");
      if (!descEl) {
        descEl = document.createElement("p");
        descEl.id = "walletHeaderDesc";
        descEl.className = "text-emerald-100/60 text-[10px] font-bold uppercase tracking-widest mt-1";
        document.getElementById("walletName").parentNode.appendChild(descEl);
      }
      descEl.textContent = _trunc(currentWallet.description || '', 42) || '—';
      if (currentWallet.description) {
        descEl.style.cursor = 'pointer';
        descEl.style.textDecoration = 'underline';
        descEl.style.textDecorationColor = 'rgba(167,243,208,0.4)';
        descEl.onclick = (e) => { e.stopPropagation(); showDescription(currentWallet.description); };
      } else {
        descEl.style.cursor = 'default';
        descEl.onclick = null;
      }
      // Nom cliquable pour description si trop long
      const nameEl = document.getElementById("walletName");
      nameEl.style.cursor = 'pointer';
      nameEl.onclick = (e) => { e.stopPropagation(); showDescription(currentWallet.name); };

      renderBalance();

      // Planifications
      const now = Date.now();
      const plans = await db.getPlanifications(walletId);
      document.getElementById("planCount").textContent = plans.length;
      const plansList = document.getElementById("plansList");
      if (plans.length === 0) {
        plansList.innerHTML = `<div class="py-12 text-center bg-gray-50 rounded-[28px] text-gray-400 text-sm font-bold border border-dashed border-gray-100">Aucune planification</div>`;
      } else {
        plansList.innerHTML = plans.map(p => {
          const nowMidnight = new Date(); nowMidnight.setHours(0, 0, 0, 0);
          const dueDate = new Date(p.nextDueDate); dueDate.setHours(0, 0, 0, 0);
          const daysDiff = Math.round((dueDate.getTime() - nowMidnight.getTime()) / 86400000);

          let notifHtml = '';
          let actionBtn = '';
          if (daysDiff > 0) {
            if (daysDiff === 1) notifHtml = '<span class="text-[8px] bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-md uppercase font-black ml-1">Demain</span>';
            else if (daysDiff === 2) notifHtml = '<span class="text-[8px] bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-md uppercase font-black ml-1">Dans 2 jours</span>';
            actionBtn = `<div class="bg-gray-100 text-gray-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ml-2 border border-gray-200 shadow-inner">J-${daysDiff}</div>`;
          } else if (daysDiff === 0) {
            notifHtml = '<span class="text-[8px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded-md uppercase font-black ml-1">Aujourd\'hui</span>';
            actionBtn = `<button onclick="handlePlanAction(${p.id}, false)" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest active:scale-95 transition-all ml-2 shadow-lg shadow-emerald-100">Valider</button>`;
          } else {
            if (daysDiff === -1) notifHtml = '<span class="text-[8px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded-md uppercase font-black ml-1">Hier</span>';
            else notifHtml = '<span class="text-[8px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded-md uppercase font-black ml-1">En retard</span>';
            actionBtn = `<button onclick="handlePlanAction(${p.id}, true)" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest active:scale-95 transition-all ml-2 shadow-lg shadow-red-100"><i class="fa-solid fa-rotate"></i> Sync</button>`;
          }

          const descIdx = window._desc.push(p.description || 'Aucune description') - 1;
          return `
            <div data-id="${p.id}" data-type="plan" data-name="${p.label}" class="plan-card bg-white border border-gray-100 shadow-sm rounded-[28px] p-4 flex justify-between items-center active:bg-gray-50 transition-all ${daysDiff < 0 ? 'border-red-100 bg-red-50/20' : ''}">
              <div class="flex gap-4 items-center min-w-0 flex-1">
                 <div class="${daysDiff < 0 ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-500'} w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid ${daysDiff < 0 ? 'fa-triangle-exclamation' : 'fa-calendar-check'} text-lg"></i>
                 </div>
                 <div class="min-w-0 flex-1">
                  <p class="font-bold text-gray-800 text-sm leading-tight truncate">${p.label} ${notifHtml}</p>
                  ${p.description ? `<p class="text-[10px] font-bold text-gray-400 opacity-70 cursor-pointer" onclick="event.stopPropagation(); showDescription(_desc[${descIdx}])" style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:underline;text-decoration-color:rgba(156,163,175,0.4)">${_trunc(p.description, 40)}</p>` : ''}
                  <p class="text-[10px] font-bold text-gray-400">${p.amount.toLocaleString('fr-FR')} FCFA • ${new Date(p.nextDueDate).toLocaleDateString('fr-FR')}</p>
                </div>
              </div>
              ${actionBtn}
            </div>
          `;
        }).join('');
      }

      // Historique
      const history = await db.getHistory(walletId);
      document.getElementById("historyCount").textContent = history.length;

      const list = document.getElementById("historyList");
      if (history.length === 0) {
        list.innerHTML = `<div class="py-12 text-center bg-gray-50 rounded-[28px] text-gray-400 text-sm font-bold border border-dashed border-gray-100">Aucun mouvement</div>`;
      } else {
        list.innerHTML = history.map(t => {
          const mainLabel = t.type === 'deposit' ? 'Dépôt' : 'Retrait';
          const subLabel = t.reason || '';
          const descIdx = t.reason ? (window._desc.push(t.reason) - 1) : -1;
          return `
          <div class="bg-white border border-gray-100 shadow-sm rounded-[28px] p-4 flex items-center justify-between active:bg-gray-50 transition-all">
            <div class="flex gap-4 items-center min-w-0 flex-1">
              <div class="w-12 h-12 ${t.type === 'deposit' ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-400'} rounded-2xl flex items-center justify-center flex-shrink-0">
                <i class="fa-solid ${t.type === 'deposit' ? 'fa-arrow-up' : 'fa-arrow-down'} text-lg"></i>
              </div>
              <div class="min-w-0 flex-1">
                <p class="font-bold text-gray-800 text-sm leading-none mb-0.5 truncate">${mainLabel}</p>
                ${subLabel ? `<p class="text-[10px] font-bold text-gray-400 cursor-pointer" onclick="event.stopPropagation(); showDescription(_desc[${descIdx}])" style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:underline;text-decoration-color:rgba(156,163,175,0.3)">${_trunc(subLabel, 40)}</p>` : ''}
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter mt-0.5">${new Date(t.date).toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</p>
              </div>
            </div>
            <div class="text-right ml-4">
              <p class="font-bold text-sm ${t.type === 'deposit' ? 'text-emerald-600' : 'text-red-500'}">
                ${t.type === 'deposit' ? '+' : '-'}${t.amount.toLocaleString('fr-FR')}
              </p>
              <p class="text-[8px] font-bold text-gray-300 uppercase leading-none">FCFA</p>
            </div>
          </div>
        `}).join('');
      }
    }

    let currentValidationTarget = null;
    window.closeValidationModal = () => document.getElementById("validationModal").style.display = 'none';
    window.showError = (msg) => {
      document.getElementById("errorMessage").textContent = msg;
      document.getElementById("errorModal").style.display = 'flex';
    };
    window.closeErrorModal = () => document.getElementById("errorModal").style.display = 'none';

    window.confirmValidation = async () => {
      const motif = document.getElementById("validationMotif").value;
      if (currentValidationTarget.type === 'withdrawal' && !motif) return showError("Le motif est obligatoire pour un retrait.");
      
      try {
        await db.validatePlanification(currentValidationTarget.id, motif);
        closeValidationModal();
        refreshUI();
      } catch (err) {
        showError(err.message || "Erreur lors de la validation");
      }
    };

    async function handlePlanAction(id, isLate) {
      if (isLate) {
        longPressTarget = { id, type: 'plan', name: (await db.getPlanificationById(id)).label };
        handleContextEdit();
      } else {
        const p = await db.getPlanificationById(id);
        currentValidationTarget = p;
        document.getElementById("validationPlanName").textContent = p.label;
        document.getElementById("validationMotif").value = p.description || "";
        const asterisk = document.getElementById("validationMotifAsterisk");
        asterisk.style.display = p.type === 'withdrawal' ? 'inline' : 'none';
        document.getElementById("validationModal").style.display = 'flex';
      }
    }

    function renderBalance() {
      const el = document.getElementById("walletBalance");
      const icon = document.getElementById("eyeButton");
      if (balanceVisible) {
        el.textContent = currentWallet.balance.toLocaleString('fr-FR') + " FCFA";
        el.classList.remove('balance-masked');
        icon.innerHTML = '<i class="fa-solid fa-eye text-lg"></i>';
      } else {
        el.innerHTML = '<span class="balance-masked tracking-widest">••••••</span> <span class="text-2xl ml-1 font-bold opacity-30">FCFA</span>';
        el.classList.add('balance-masked');
        icon.innerHTML = '<i class="fa-solid fa-eye-slash text-lg"></i>';
      }
    }

    function toggleBalance() {
      balanceVisible = !balanceVisible;
      renderBalance();
    }

    // BOTTOM SHEET LOGIC
    window.closeSheet = () => {
      document.getElementById("actionSheetContent").classList.add("sheet-content-hidden");
      setTimeout(() => document.getElementById("actionSheet").classList.add("sheet-hidden"), 300);
    };

    window.showDescription = (text) => {
      document.getElementById("descFullText").textContent = text;
      document.getElementById("descOverlay").style.display = 'flex';
    };
    window.closeDesc = () => { document.getElementById("descOverlay").style.display = 'none'; };

    window.openTxModal = (type) => {
      currentAction = type;
      longPressTarget = null;
      resetSteps();
      document.getElementById("actionSheet").classList.remove("sheet-hidden");
      setTimeout(() => document.getElementById("actionSheetContent").classList.remove("sheet-content-hidden"), 10);

      document.getElementById("formTitle").textContent = type === 'deposit' ? "Déposer" : "Retirer";
      document.getElementById("txForm").classList.remove("hidden");
      document.getElementById("planForm").classList.add("hidden");
      document.getElementById("walletForm").classList.add("hidden");
    };

    window.openPlanModal = () => {
      currentAction = 'plan';
      longPressTarget = null;
      resetSteps();
      document.getElementById("actionSheet").classList.remove("sheet-hidden");
      setTimeout(() => document.getElementById("actionSheetContent").classList.remove("sheet-content-hidden"), 10);

      document.getElementById("formTitle").textContent = "Nouvelle planification";
      document.getElementById("txForm").classList.add("hidden");
      document.getElementById("planForm").classList.remove("hidden");
      document.getElementById("walletForm").classList.add("hidden");
      document.getElementById("planDate").valueAsDate = new Date();
    };

    function resetSteps() {
      document.getElementById("formAmount").value = "";
      document.getElementById("formReason").value = "";
      document.getElementById("planName").value = "";
      document.getElementById("planDesc").value = "";
      document.getElementById("planAmount").value = "";
      document.getElementById("walletNameInput").value = "";
      document.getElementById("walletDescInput").value = "";
      longPressTarget = null;
    }

    window.submitForm = async () => {
      if (currentAction === 'wallet') {
        const name = document.getElementById("walletNameInput").value;
        const desc = document.getElementById("walletDescInput").value;
        if (!name) return showError("Le nom du portefeuille est obligatoire.");
        await db.updateWallet(walletId, { name, description: desc });
      } else if (currentAction === 'plan') {
        const data = {
          walletId: walletId,
          label: document.getElementById("planName").value,
          description: document.getElementById("planDesc").value,
          amount: parseFloat(document.getElementById("planAmount").value),
          type: document.getElementById("planType").value,
          startDate: new Date(document.getElementById("planDate").value).getTime(),
          freqVal: parseInt(document.getElementById("planFreqVal").value) || 0,
          freqUnit: document.getElementById("planFreqUnit").value
        };

        if (!data.label) return showError("Le nom de la planification est obligatoire.");
        if (!data.amount || isNaN(data.amount)) return showError("Le montant est invalide.");
        if (!data.description) return showError("La description est obligatoire pour une planification.");
        if (isNaN(data.startDate)) return showError("La date de départ est invalide.");

        // Restriction: Date passée
        const today = new Date(); today.setHours(0, 0, 0, 0);
        if (data.startDate < today.getTime() && !longPressTarget) {
          return showError("Impossible de planifier une tâche dans le passé.");
        }

        if (longPressTarget) await db.updatePlanification(longPressTarget.id, data);
        else await db.addPlan(data);
      } else {
        const amount = parseFloat(document.getElementById("formAmount").value);
        const reason = document.getElementById("formReason").value;
        if (!amount || isNaN(amount)) return showError("Montant invalide");
        if (currentAction === 'withdrawal' && !reason) return showError("Le motif est obligatoire pour un retrait.");

        try {
          await db.addTx(walletId, amount, currentAction, reason);
        } catch (e) {
          return showError(e.message);
        }
      }
      closeSheet();
      refreshUI();
    };

    // LONG PRESS
    function initLongPress() {
      const items = [...document.querySelectorAll('.plan-card'), document.getElementById('walletHeader')];
      items.forEach(item => {
        if (!item) return;
        item.onmousedown = (e) => startPress(e, item);
        item.ontouchstart = (e) => startPress(e, item);
        item.onmouseup = clearPress;
        item.onmouseleave = clearPress;
        item.ontouchend = clearPress;
        item.ontouchmove = clearPress;
      });
    }

    function startPress(e, item) {
      longPressTarget = item.id === 'walletHeader' ? null : {
        id: parseInt(item.dataset.id),
        type: item.dataset.type,
        name: item.dataset.name,
        x: e.clientX || e.touches[0].clientX,
        y: e.clientY || e.touches[0].clientY
      };

      // If header, we don't need coordinates for context menu, just trigger edit directly or show a menu
      if (item.id === 'walletHeader') {
        pressTimer = setTimeout(() => {
          handleContextEdit(); // Direct edit for header
        }, 800);
      } else {
        pressTimer = setTimeout(showContextMenu, 600);
      }
    }

    function clearPress() { clearTimeout(pressTimer); }

    function showContextMenu() {
      const menu = document.getElementById("contextMenu");
      menu.style.left = `${Math.min(longPressTarget.x, window.innerWidth - 160)}px`;
      menu.style.top = `${longPressTarget.y}px`;
      menu.classList.add("active");

      const hideMenu = () => {
        menu.classList.remove("active");
        document.removeEventListener('click', hideMenu);
      };
      setTimeout(() => document.addEventListener('click', hideMenu), 10);
    }

    window.closeDeleteModal = () => document.getElementById("deleteModal").style.display = 'none';
    window.confirmDelete = async () => {
      const input = document.getElementById("deleteConfirmInput").value.trim().toLowerCase();
      const targetName = longPressTarget.name.trim().toLowerCase();
      if (input === targetName) {
        await db.deletePlanification(longPressTarget.id);
        closeDeleteModal();
        refreshUI();
      } else {
        showError("Le nom ne correspond pas exactement.");
      }
    };

    window.handleContextDelete = async () => {
      document.getElementById("deleteItemName").textContent = longPressTarget.name;
      document.getElementById("deleteConfirmInput").value = "";
      document.getElementById("deleteModal").style.display = 'flex';
    };

    window.handleContextEdit = async () => {
      if (!longPressTarget) {
        // Edit current wallet if no target
        currentAction = 'wallet';
        document.getElementById("actionSheet").classList.remove("sheet-hidden");
        setTimeout(() => document.getElementById("actionSheetContent").classList.remove("sheet-content-hidden"), 10);
        document.getElementById("formTitle").textContent = "Modifier Portefeuille";
        document.getElementById("txForm").classList.add("hidden");
        document.getElementById("planForm").classList.add("hidden");
        document.getElementById("walletForm").classList.remove("hidden");
        document.getElementById("walletNameInput").value = currentWallet.name;
        document.getElementById("walletDescInput").value = currentWallet.description || "";
        return;
      }

      document.getElementById("actionSheet").classList.remove("sheet-hidden");
      setTimeout(() => document.getElementById("actionSheetContent").classList.remove("sheet-content-hidden"), 10);

      if (longPressTarget.type === 'plan') {
        const p = await db.getPlanificationById(longPressTarget.id);
        currentAction = 'plan';
        document.getElementById("formTitle").textContent = "Modifier planification";
        document.getElementById("txForm").classList.add("hidden");
        document.getElementById("planForm").classList.remove("hidden");
        document.getElementById("walletForm").classList.add("hidden");

        document.getElementById("planName").value = p.label;
        document.getElementById("planDesc").value = p.description || "";
        document.getElementById("planAmount").value = p.amount;
        document.getElementById("planType").value = p.type;
        document.getElementById("planDate").valueAsDate = new Date(p.startDate);
        document.getElementById("planFreqVal").value = p.freqVal;
        document.getElementById("planFreqUnit").value = p.freqUnit;
      }
    };
    // NAVIGATION LOGIC
    window.nav = (url) => {
      window.location.href = `chargement.html?to=${url}`;
    };

    window.notify = async (title, body) => {
      if ("Notification" in window && Notification.permission === "granted") {
        const registration = await navigator.serviceWorker.ready;
        registration.showNotification(title, {
          body,
          icon: 'assets/icon.png',
          badge: 'assets/icon.png',
          vibrate: [200, 100, 200]
        });
        notifSound.play().catch(() => { });
      }
    };
  </script>
  <script src="tutorial.js"></script>
</body>
