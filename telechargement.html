<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Téléchargement - Portefeuille</title>
    <script src="js/tailwind.js"></script>
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(52, 211, 153, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.08) 0, transparent 50%), 
                radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.08) 0, transparent 50%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.1);
        }

        .pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }

        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
    
    <div class="mesh-gradient"></div>

    <!-- BACK BUTTON -->
    <button onclick="window.location.href='index.html'" class="fixed top-8 left-8 w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition z-50">
        <i class="fa-solid fa-arrow-left text-slate-800"></i>
    </button>

    <div class="glass-card p-10 max-w-sm w-full flex flex-col items-center gap-8 fade-in">
        <!-- Icon -->
        <div class="relative">
            <div class="absolute inset-0 bg-emerald-400/20 blur-3xl rounded-full pulse-soft"></div>
            <div class="w-24 h-24 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-3xl flex items-center justify-center shadow-xl shadow-emerald-200/50 relative z-10">
                <i class="fa-solid fa-wallet text-4xl text-white"></i>
            </div>
        </div>

        <!-- Info -->
        <div class="space-y-3">
            <h1 class="text-3xl font-black text-slate-800">Prêt pour l'installation</h1>
            <p class="text-slate-500 text-sm leading-relaxed">Installez l'application sur votre écran d'accueil pour un accès instantané et une expérience fluide, même sans connexion.</p>
        </div>

        <!-- Action Button -->
        <div id="installArea" class="w-full">
            <button id="btnInstall" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-3">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                Installer l'App
            </button>
            <p id="notSupported" class="hidden text-slate-400 text-[10px] mt-4 font-bold uppercase tracking-widest">
                L'installation n'est pas supportée par ce navigateur
            </p>
        </div>

        <!-- Success State (Hidden) -->
        <div id="installSuccess" class="hidden flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-check text-2xl"></i>
            </div>
            <p class="text-emerald-600 font-black text-sm uppercase tracking-widest">Installation Réussie !</p>
        </div>
    </div>

    <!-- Instructions for iOS -->
    <div class="mt-8 text-slate-400 text-xs px-6 leading-relaxed fade-in" style="animation-delay: 0.5s">
        <p>Sur iPhone : Appuyez sur <i class="fa-solid fa-arrow-up-from-bracket mx-1 text-[10px]"></i> puis sur <strong>"Sur l'écran d'accueil"</strong></p>
    </div>

    <script>
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const installArea = document.getElementById('installArea');
        const installSuccess = document.getElementById('installSuccess');
        const notSupported = document.getElementById('notSupported');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.disabled = false;
        });

        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) {
                // Si pas de prompt (déjà installé ou non supporté)
                alert("Utilisez le menu de votre navigateur pour 'Ajouter à l'écran d'accueil'.");
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installArea.classList.add('hidden');
                installSuccess.classList.remove('hidden');
            }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installArea.classList.add('hidden');
            installSuccess.classList.remove('hidden');
        });

        // Détection basique si déjà en standalone
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installArea.classList.add('hidden');
            installSuccess.classList.remove('hidden');
        }
    </script>
</body>
</html>
