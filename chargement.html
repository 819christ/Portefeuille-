<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chargement...</title>
    <script src="js/tailwind.js"></script>
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(52, 211, 153, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.08) 0, transparent 50%), 
                radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.08) 0, transparent 50%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.1);
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-bar {
            animation: progress 2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 1s infinite linear;
        }

        .pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }

        .floating {
            animation: floating 4s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    
    <div class="mesh-gradient"></div>

    <div class="glass-card p-12 flex flex-col items-center gap-10 fade-in floating">
        <!-- Logo Section -->
        <div class="relative">
            <!-- Decorative rings -->
            <div class="absolute inset-0 bg-emerald-400/20 blur-3xl rounded-full pulse-soft"></div>
            
            <div class="w-28 h-28 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-[32px] flex items-center justify-center shadow-xl shadow-emerald-200/50 relative z-10">
                <i class="fa-solid fa-wallet text-5xl text-white"></i>
            </div>
        </div>

        <!-- Text Section -->
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-black text-slate-800 tracking-tight">Portefeuille</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-[1px] w-4 bg-emerald-200"></span>
                <p class="text-emerald-600 font-bold text-[10px] uppercase tracking-[0.4em]">Gestion Intelligente</p>
                <span class="h-[1px] w-4 bg-emerald-200"></span>
            </div>
        </div>

        <!-- Loading Section -->
        <div class="w-full space-y-4">
            <div class="w-64 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                <div class="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 rounded-full progress-bar shadow-[0_0_10px_rgba(16,185,129,0.3)]"></div>
            </div>
            <p class="text-center text-slate-400 text-xs font-medium animate-pulse">Initialisation sécurisée...</p>
        </div>
    </div>

    <!-- Footer -->
    <div class="fixed bottom-12 flex flex-col items-center gap-3 fade-in" style="animation-delay: 0.5s">
        <div class="flex items-center gap-2 opacity-30">
            <div class="w-8 h-[1px] bg-slate-400"></div>
            <i class="fa-solid fa-shield-halved text-[8px] text-slate-400"></i>
            <div class="w-8 h-[1px] bg-slate-400"></div>
        </div>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] opacity-40">
            Propulsé par <span class="text-slate-600">Antigravity AI</span>
        </p>
    </div>

    <script>
        // Automatic redirection after progress bar finish
        setTimeout(() => {
            const url = new URLSearchParams(window.location.search).get('to') || 'index.html';
            window.location.href = url;
        }, 2500); // Un peu plus long pour laisser apprécier le design
    </script>
</body>
</html>
